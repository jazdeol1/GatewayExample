spring:
  application:
    name: GatewayExample
  cloud:
    gateway:
      server:
        webmvc:
          routes-map:
            example-backend:
              uri: ${dependencies.some-service.url}
              predicates:
                - Path=/api/**

# Backend URL – overridden in tests via @DynamicPropertySource
dependencies:
  some-service:
    url: http://localhost:8081
logging:
  level:
    org.springframework: DEBUG
